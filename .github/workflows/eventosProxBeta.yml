name: EventosProxMod1_2

on:
  schedule:
    - cron: '1 4 * * *'  # Ejecutar diariamente a las 04:01 UTC
  workflow_dispatch: {}  # Permitir ejecución manual

jobs:
  scrape-and-process:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      TZ: Europe/Madrid
      HEADLESS: "true"
      MAX_SCROLLS: "15"
      SCROLL_WAIT_S: "3.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mostrar IP pública del runner
        run: |
          echo "IP pública del runner GitHub Actions:"
          curl -s https://api.ipify.org
          echo ""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Chrome and ChromeDriver
        run: |
          set -e

          sudo apt-get update
          sudo apt-get install -y wget gnupg unzip

          # Instalar Chrome
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list

          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          # Instalar ChromeDriver compatible
          CHROME_VERSION=$(google-chrome-stable --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
          echo "Chrome version: $CHROME_VERSION"

          CHROMEDRIVER_URL="https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"

          if wget -q --spider "$CHROMEDRIVER_URL"; then
            echo "Descargando ChromeDriver $CHROME_VERSION"
            wget -O chromedriver.zip "$CHROMEDRIVER_URL"
            unzip -o chromedriver.zip
            sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
            sudo chmod +x /usr/local/bin/chromedriver
          else
            echo "Usando ChromeDriver de apt como fallback"
            sudo apt-get install -y chromium-chromedriver
            sudo ln -sf /usr/bin/chromedriver /usr/local/bin/chromedriver
          fi

          # Verificar instalaciones
          which google-chrome-stable
          which chromedriver
          google-chrome-stable --version
          chromedriver --version

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 python-dotenv lxml requests

      - name: Create output directory
        run: |
          set -e
          mkdir -p ./output

      - name: Run Python scraper
        timeout-minutes: 90
        env:
          TZ: Europe/Madrid
          HEADLESS: "true"
          MAX_SCROLLS: "12"
          SCROLL_WAIT_S: "2.0"
          LIMIT_EVENTS: "35"
          MAX_RUNTIME_MIN: "25"
        run: |
          set -e
          echo "=== EJECUTANDO SCRAPER ==="
          python ./EventosProxBeta.py --module all
          echo "=== SCRAPER COMPLETADO ==="

      - name: Verify generated files
        run: |
          set -e

          echo "=== VERIFICANDO ARCHIVOS GENERADOS ==="
          ls -la ./output/

          missing_files=0
          required_files=("01events.json" "02info.json")

          for file in "${required_files[@]}"; do
            if [ -f "./output/$file" ]; then
              file_size=$(stat -c%s "./output/$file")
              echo "✅ $file: ENCONTRADO (${file_size} bytes)"
            else
              echo "❌ $file: NO ENCONTRADO"
              missing_files=$((missing_files + 1))
            fi
          done

          if [ $missing_files -eq 0 ]; then
            echo "✅ TODOS los archivos requeridos están presentes"
          else
            echo "❌ Faltan $missing_files archivos requeridos"
            exit 1
          fi

      - name: Compress JSON files
        run: |
          set -e

          echo "=== COMPRIMIENDO ARCHIVOS ==="

          for file in ./output/0*.json; do
            if [ -f "$file" ]; then
              echo "Comprimiendo: $(basename "$file")"
              gzip -9 -c "$file" > "${file}.gz"

              original_size=$(stat -c%s "$file")
              compressed_size=$(stat -c%s "${file}.gz")

              if [ "$original_size" -gt 0 ]; then
                compression_ratio=$(( (compressed_size * 100) / original_size ))
                echo "  ${original_size} bytes → ${compressed_size} bytes (${compression_ratio}%)"
              else
                echo "  ${original_size} bytes → ${compressed_size} bytes"
              fi
            fi
          done

          echo "=== ARCHIVOS COMPRIMIDOS ==="
          ls -la ./output/*.gz

      - name: Validate compressed files
        run: |
          set -e

          echo "=== VALIDANDO GZIP ==="

          gzip -t ./output/01events.json.gz
          gzip -t ./output/02info.json.gz

          echo "✅ Archivos .gz validados correctamente"

      - name: Create backup directory
        run: |
          set -e
          mkdir -p ./backup

      - name: Backup uncompressed files
        run: |
          set -e

          echo "=== CREANDO BACKUP LOCAL ==="

          cp ./output/01events.json ./backup/
          cp ./output/02info.json ./backup/

          echo "Backup de archivos sin comprimir creado en ./backup/"
          ls -la ./backup/

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-backup-uncompressed-${{ github.run_number }}
          path: |
            ./backup/01events.json
            ./backup/02info.json
          retention-days: 7

      - name: Upload compressed files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-compressed-${{ github.run_number }}
          path: |
            ./output/01events.json.gz
            ./output/02info.json.gz
          retention-days: 7

      - name: Instalar cliente SFTP
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload files by SFTP SSH 22
        id: sftp_upload
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail

          echo "=== SUBIENDO ARCHIVOS POR SFTP ==="

          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "❌ ERROR: Variables SFTP no configuradas correctamente"
            exit 1
          fi

          REMOTE_DIR="www/NewWeb/Privado/Competiciones/EventosProx/Flow/data"

          echo "Subiendo por SFTP a:"
          echo "Servidor: ${FTP_SERVER}"
          echo "Puerto: 22"
          echo "Ruta remota: ${REMOTE_DIR}"

          upload_one () {
            local SRC="$1"
            local DST="$2"

            echo ""
            echo "===================================================="
            echo "Subiendo archivo local: ${SRC}"
            echo "Destino remoto: ${DST}"
            echo "===================================================="

            if [ ! -f "$SRC" ]; then
              echo "❌ No existe el archivo local: $SRC"
              return 1
            fi

            for attempt in 1 2 3 4 5; do
              echo "Intento SFTP ${attempt}/5 para ${DST}"

              set +e
              timeout 180 lftp -u "${FTP_USERNAME},${FTP_PASSWORD}" "sftp://${FTP_SERVER}:22" -e "\
                set cmd:fail-exit yes; \
                set net:timeout 30; \
                set net:max-retries 1; \
                set net:reconnect-interval-base 10; \
                set sftp:auto-confirm yes; \
                set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=2'; \
                pwd; \
                cd ${REMOTE_DIR}; \
                pwd; \
                put ${SRC} -o ${DST}; \
                bye"
              rc=$?
              set -e

              if [ "$rc" -eq 0 ]; then
                echo "✅ OK por SFTP: ${DST}"
                return 0
              fi

              if [ "$rc" -eq 124 ]; then
                echo "⚠️ Timeout: el intento SFTP se quedó colgado y fue cancelado automáticamente"
              else
                echo "⚠️ Falló SFTP para ${DST} con rc=${rc}"
              fi

              if [ "$attempt" -lt 5 ]; then
                echo "Esperando 30 segundos antes de reintentar..."
                sleep 30
              fi
            done

            echo "❌ No se pudo subir ${DST} por SFTP después de varios intentos"
            return 1
          }

          upload_one "./output/01events.json.gz" "01events.json.gz"
          upload_one "./output/02info.json.gz" "02info.json.gz"

          # También subir 01events.json sin comprimir, como hacía el workflow anterior
          upload_one "./output/01events.json" "01events.json"

          echo "✅ Subida SFTP completada"

      - name: Verificar archivos remotos por SFTP
        if: steps.sftp_upload.outcome == 'success'
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail

          REMOTE_DIR="www/NewWeb/Privado/Competiciones/EventosProx/Flow/data"

          echo "=== VERIFICANDO ARCHIVOS REMOTOS POR SFTP ==="

          timeout 120 lftp -u "${FTP_USERNAME},${FTP_PASSWORD}" "sftp://${FTP_SERVER}:22" -e "\
            set cmd:fail-exit yes; \
            set net:timeout 30; \
            set net:max-retries 1; \
            set sftp:auto-confirm yes; \
            set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=2'; \
            pwd; \
            cd ${REMOTE_DIR}; \
            pwd; \
            cls -l 01events.json.gz; \
            cls -l 02info.json.gz; \
            cls -l 01events.json; \
            bye"

          echo "✅ Verificación básica SFTP completada"

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== DEBUGGING FAILURE ==="

          echo "Listando archivos en output:"
          ls -la ./output/ 2>/dev/null || echo "No output directory"

          echo "Listando archivos en backup:"
          ls -la ./backup/ 2>/dev/null || echo "No backup directory"

          echo "=== VERIFICANDO CHROME ==="
          which google-chrome-stable && echo "Chrome encontrado: $(google-chrome-stable --version)" || echo "Chrome NO encontrado"
          which chromedriver && echo "Chromedriver encontrado: $(chromedriver --version)" || echo "Chromedriver NO encontrado"

          echo "=== TAMAÑOS DE ARCHIVOS ==="
          for file in ./output/*.json ./output/*.gz; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file")
              echo "$(basename "$file"): $size bytes"
            fi
          done
