name: EventProxPart (FlowAgility eventos + participantes)Beta

on:
  workflow_dispatch:
    inputs:
      limit_events:
        description: "Máximo de eventos a procesar (0 = sin límite)"
        required: false
        default: "2"  # Cambiado a 2 para pruebas
      max_runtime_min:
        description: "Corte ordenado a los N minutos (0 = sin límite)"
        required: false
        default: "10"  # Reducido para pruebas
  schedule:
    # 03:40 UTC ≈ 05:40 Europe/Madrid (según DST)
    - cron: "40 3 * * *"

permissions:
  contents: read

concurrency:
  group: eventproxpart-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 30  # Reducido para pruebas

    env:
      TZ: Europe/Madrid
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

      # ---- Scraper ENV ----
      HEADLESS: "true"
      INCOGNITO: "true"
      OUT_DIR: "./output"
      MAX_SCROLLS: "5"  # Reducido para pruebas
      SCROLL_WAIT_S: "1.5"
      # LIMIT_EVENTS ya no se usa directamente, se controla desde el script
      MAX_RUNTIME_MIN: "${{ github.event.inputs.max_runtime_min || '10' }}"

      # Throttling + resume (reducido para pruebas)
      THROTTLE_EVENT_S: "1.5"
      THROTTLE_PAGE_MIN_S: "0.8"
      THROTTLE_PAGE_MAX_S: "1.5"
      THROTTLE_TOGGLE_MIN_S: "0.5"
      THROTTLE_TOGGLE_MAX_S: "1.2"
      AUTO_SAVE_EVERY: "2"  # Reducido para pruebas
      RESUME: "false"  # Desactivado para pruebas
      RESUME_FILE: ""

      # Credenciales (usar Secrets) - CORREGIDO: usar FLOW_EMAIL y FLOW_PASS
      FLOW_EMAIL: "${{ secrets.FLOW_EMAIL }}"
      FLOW_PASS: "${{ secrets.FLOW_PASS }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Show Chrome versions
        run: |
          google-chrome --version || true
          google-chrome-stable --version || true
          chromedriver --version || true

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install selenium beautifulsoup4 python-dotenv
          fi

      - name: Prepare output dir
        run: |
          mkdir -p "${OUT_DIR}"
          echo "OUT_DIR contents (before):"
          ls -la "${OUT_DIR}" || true

      - name: Run Python scraper (events + participants)
        timeout-minutes: 25
        env:
          HEADLESS: "${{ env.HEADLESS }}"
          INCOGNITO: "${{ env.INCOGNITO }}"
          OUT_DIR: "${{ env.OUT_DIR }}"
          MAX_SCROLLS: "${{ env.MAX_SCROLLS }}"
          SCROLL_WAIT_S: "${{ env.SCROLL_WAIT_S }}"
          MAX_RUNTIME_MIN: "${{ env.MAX_RUNTIME_MIN }}"
          THROTTLE_EVENT_S: "${{ env.THROTTLE_EVENT_S }}"
          THROTTLE_PAGE_MIN_S: "${{ env.THROTTLE_PAGE_MIN_S }}"
          THROTTLE_PAGE_MAX_S: "${{ env.THROTTLE_PAGE_MAX_S }}"
          THROTTLE_TOGGLE_MIN_S: "${{ env.THROTTLE_TOGGLE_MIN_S }}"
          THROTTLE_TOGGLE_MAX_S: "${{ env.THROTTLE_TOGGLE_MAX_S }}"
          AUTO_SAVE_EVERY: "${{ env.AUTO_SAVE_EVERY }}"
          RESUME: "${{ env.RESUME }}"
          RESUME_FILE: "${{ env.RESUME_FILE }}"
          FLOW_EMAIL: "${{ env.FLOW_EMAIL }}"
          FLOW_PASS: "${{ env.FLOW_PASS }}"
        run: |
          echo "=== EJECUTANDO SCRAPER EN MODO PRUEBAS (2 EVENTOS) ==="
          echo "Script: EventosProxconParticipantes.py"
          echo "Módulo: all"
          echo "Límite de eventos: 2 (hardcoded en el script)"
          python ./EventosProxconParticipantes.py --module all
          echo "=== SCRAPER COMPLETADO ==="

      - name: Verify generated files
        run: |
          echo '=== VERIFICANDO ARCHIVOS GENERADOS ==='
          ls -la ./output/
          
          # Verificar que existen los archivos finales (adaptado a tu script)
          missing_files=0
          required_files=("01events.json" "02info.json")
          
          for file in "${required_files[@]}"; do
              if [ -f "./output/$file" ]; then
                  file_size=$(stat -c%s "./output/$file")
                  echo "✅ $file: ENCONTRADO (${file_size} bytes)"
                  
                  # Mostrar contenido de muestra para verificar
                  if [ "$file_size" -gt 0 ]; then
                    echo "   Primeras líneas:"
                    head -5 "./output/$file"
                  fi
              else
                  echo "❌ $file: NO ENCONTRADO"
                  missing_files=$((missing_files + 1))
              fi
          done
          
          # Verificar también archivos con fecha
          dated_files=$(ls ./output/01events_*.json ./output/02info_*.json 2>/dev/null | wc -l)
          echo "📅 Archivos con fecha: $dated_files encontrados"
          
          if [ $missing_files -eq 0 ]; then
              echo "✅ TODOS los archivos requeridos están presentes"
          else
              echo "❌ Faltan $missing_files archivos requeridos"
              exit 1
          fi

      - name: Compress JSON files for FTP
        run: |
          echo "=== COMPRIMIENDO ARCHIVOS PARA FTP ==="
          
          # Comprimir archivos JSON con gzip
          for file in ./output/0*.json; do
              if [ -f "$file" ]; then
                  echo "Comprimiendo: $(basename $file)"
                  gzip -9 -c "$file" > "${file}.gz"
                  original_size=$(stat -c%s "$file")
                  compressed_size=$(stat -c%s "${file}.gz")
                  compression_ratio=$(( (compressed_size * 100) / original_size ))
                  echo "  ${original_size} bytes → ${compressed_size} bytes (${compression_ratio}%)"
              fi
          done
          
          echo "=== ARCHIVOS COMPRIMIDOS ==="
          ls -la ./output/*.gz

      - name: Upload compressed files to FTP (condicional)
        if: github.event_name == 'workflow_dispatch'  # Solo en ejecución manual
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          echo '=== SUBIENDO ARCHIVOS COMPRIMIDOS (MODO PRUEBAS) ==='
          
          # Verificar que las variables estén configuradas
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
              echo "❌ ERROR: Variables FTP no configuradas correctamente"
              echo "⚠️  Saltando subida FTP - esto es normal en modo pruebas"
              exit 0  # No fallar el workflow
          fi
          
          REMOTE_DIR="${FTP_REMOTE_DIR}/Competiciones/EventosProx/Flow/data/TEST"
          BASE_URL="ftp://${FTP_SERVER}${REMOTE_DIR}"
          
          echo "Subiendo a directorio de pruebas: ${BASE_URL}/"
          
          # Crear directorio de pruebas
          curl --fail \
               --ssl-reqd \
               --ftp-create-dirs \
               --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
               -Q "MKD ${REMOTE_DIR}" \
               "ftp://${FTP_SERVER}/" || echo "Directorio ya existe o no se pudo crear"
          
          # Archivos a subir (adaptado a tu script)
          COMPRESSED_FILES=("01events.json.gz" "02info.json.gz")
          
          # Subir archivos comprimidos
          for file in "${COMPRESSED_FILES[@]}"; do
              local_file="./output/$file"
              
              if [ ! -f "$local_file" ]; then
                  echo "⚠️ Archivo comprimido $file no encontrado - saltando"
                  continue
              fi
              
              echo "📤 Subiendo archivo comprimido: $file"
              
              # Subir archivo comprimido
              curl --fail \
                   --ssl-reqd \
                   --ftp-create-dirs \
                   --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
                   --upload-file "$local_file" \
                   "${BASE_URL}/$file"
              
              if [ $? -eq 0 ]; then
                  echo "✅ $file subido exitosamente a directorio TEST"
              else
                  echo "❌ Error subiendo archivo comprimido $file"
              fi
              
              sleep 1
          done

      - name: Create backup directory
        run: mkdir -p ./backup

      - name: Backup uncompressed files
        run: |
          echo "=== CREANDO BACKUP LOCAL ==="
          cp ./output/01events.json ./backup/ 2>/dev/null || echo "01events.json no encontrado"
          cp ./output/02info.json ./backup/ 2>/dev/null || echo "02info.json no encontrado"
          echo "Backup de archivos sin comprimir creado en ./backup/"
          ls -la ./backup/

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-backup-uncompressed
          path: |
            ./backup/01events.json
            ./backup/02info.json
          retention-days: 7
          if-no-files-found: warn

      - name: Upload compressed files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-compressed
          path: |
            ./output/01events.json.gz
            ./output/02info.json.gz
          retention-days: 3
          if-no-files-found: warn

      - name: Show final summary
        run: |
          echo "=== RESUMEN FINAL ==="
          echo "Archivos generados en ./output/:"
          ls -la ./output/
          echo ""
          echo "Tamaños de archivos JSON:"
          for file in ./output/*.json; do
              if [ -f "$file" ]; then
                  size=$(stat -c%s "$file")
                  lines=$(wc -l < "$file" 2>/dev/null || echo "N/A")
                  echo "  $(basename $file): $size bytes, $lines líneas"
              fi
          done
          echo ""
          echo "✅ Proceso completado en modo pruebas (2 eventos)"

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== DEBUGGING FAILURE ==="
          echo "Listando archivos en output:"
          ls -la ./output/ 2>/dev/null || echo "No output directory"
          echo "Listando archivos en backup:"
          ls -la ./backup/ 2>/dev/null || echo "No backup directory"
          echo "=== VERIFICANDO CHROME ==="
          which google-chrome-stable && echo "Chrome encontrado: $(google-chrome-stable --version)" || echo "Chrome NO encontrado"
          which chromedriver && echo "Chromedriver encontrado: $(chromedriver --version)" || echo "Chromedriver NO encontrado"
          echo "=== ÚLTIMOS LOGS ==="
          tail -100 /home/runner/.bash_history 2>/dev/null || echo "No history available"
